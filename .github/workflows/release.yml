name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GODOT_VERSION: 4.6.2
      GODOT_STATUS: stable
      GODOT_BIN: /tmp/godot/Godot_v4.6.2-stable_linux.x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            /tmp/godot
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.${{ env.GODOT_STATUS }}
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}-linux-x86_64-with-templates

      - name: Install Godot and export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/godot
          curl -L -o /tmp/godot/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          unzip -q /tmp/godot/godot.zip -d /tmp/godot

          curl -L -o /tmp/godot/export_templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          mkdir -p /tmp/godot/export_templates
          unzip -q /tmp/godot/export_templates.tpz -d /tmp/godot/export_templates

          template_dir="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "$template_dir"
          template_source="$(find /tmp/godot/export_templates -type d -name templates | head -n 1)"
          cp "$template_source"/* "$template_dir"/

      - name: Prepare Godot executable
        shell: bash
        run: chmod +x "$GODOT_BIN"

      - name: Export Windows release
        shell: pwsh
        run: |
          .\tools\export_windows_release.ps1 `
            -GodotBin "${{ env.GODOT_BIN }}" `
            -PythonBin "python3" `
            -Version "${{ github.ref_name }}"

      - name: Package release files
        shell: pwsh
        run: |
          $manifest = Get-ChildItem -Path package -Filter "*.manifest.json" | Sort-Object LastWriteTime | Select-Object -Last 1
          if ($null -eq $manifest) {
            throw "Release manifest not found."
          }

          $manifestData = Get-Content -LiteralPath $manifest.FullName -Raw | ConvertFrom-Json
          $exePath = [string]$manifestData.output_path
          if (-not (Test-Path -LiteralPath $exePath)) {
            throw "Release executable not found: $exePath"
          }

          $tag = "${{ github.ref_name }}"
          $zipPath = Join-Path (Resolve-Path "package") "LostFragments-$tag-windows-x86_64.zip"
          Compress-Archive -LiteralPath @($exePath, $manifest.FullName) -DestinationPath $zipPath -Force

          "RELEASE_ZIP=$zipPath" >> $env:GITHUB_ENV
          "RELEASE_MANIFEST=$($manifest.FullName)" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $args = @(
            "release", "create", $tag,
            $env:RELEASE_ZIP,
            $env:RELEASE_MANIFEST,
            "--title", $tag,
            "--generate-notes"
          )
          if ($tag -match "-(alpha|beta|rc)") {
            $args += "--prerelease"
          }
          gh @args
